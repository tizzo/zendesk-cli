name: Release

# Every push to main: run the unit tests on Linux; only if they pass, build
# release binaries for macOS, Windows, and Linux and auto-publish a GitHub
# Release with the artifacts attached.
on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Gate: the whole release is blocked unless the unit tests pass on Linux.
  test:
    name: unit tests (linux gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all --locked

  build:
    name: build ${{ matrix.target }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          dist="zd-${{ matrix.target }}"
          mkdir "$dist"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/zd.exe" "$dist/"
          else
            cp "target/${{ matrix.target }}/release/zd" "$dist/"
          fi
          cp README.md LICENSE "$dist/"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "${dist}.zip" "$dist" >/dev/null
            echo "ASSET=${dist}.zip" >> "$GITHUB_ENV"
          else
            tar czf "${dist}.tar.gz" "$dist"
            echo "ASSET=${dist}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute release tag
        id: tag
        run: |
          version=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          echo "tag=v${version}-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: dist/**
          generate_release_notes: true
          make_latest: true
